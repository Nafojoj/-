<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>WF — Услуги</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Martian+Mono:wght@400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1440px; height:900px; overflow:hidden; background:#1A1A1A; font-family:'Montserrat',sans-serif; }
.ph  { background:#2A2A2A; border-radius:3px; }
.phl { background:#333;   border-radius:3px; }
.lbl { font-family:'Martian Mono',monospace; font-size:9px; color:rgba(255,255,255,0.22); letter-spacing:.1em; text-transform:uppercase; white-space:nowrap; }
.badge { position:absolute; font-family:'Martian Mono',monospace; font-size:8px; color:rgba(255,255,255,0.28); background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); padding:2px 7px; border-radius:3px; letter-spacing:.07em; text-transform:uppercase; white-space:nowrap; }
.page { width:1440px; height:900px; position:relative; overflow:hidden; }
</style>
</head>
<body>
<div class="page">

  <!-- NAV -->
  <div style="position:absolute;top:0;left:0;right:0;height:64px;background:#222;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 80px;gap:48px">
    <div class="ph" style="width:80px;height:14px"></div>
    <div style="display:flex;gap:32px;margin-left:auto">
      <div class="ph" style="width:56px;height:10px"></div>
      <div class="ph" style="width:56px;height:10px"></div>
      <div class="ph" style="width:56px;height:10px;opacity:.5"></div>
      <div class="ph" style="width:56px;height:10px"></div>
    </div>
    <div class="ph" style="width:120px;height:36px;border-radius:4px;background:#555"></div>
  </div>

  <!-- HERO STRIP -->
  <div style="position:absolute;top:64px;left:0;right:0;height:120px;background:#1E1E1E;border-bottom:1px solid rgba(255,255,255,0.06);padding:0 80px;display:flex;align-items:center;gap:48px">
    <div style="display:flex;flex-direction:column;gap:10px;flex:1">
      <div class="ph" style="width:100px;height:10px"></div>
      <div class="phl" style="width:320px;height:36px;border-radius:4px"></div>
    </div>
    <div class="ph" style="width:500px;height:48px;border-radius:4px"></div>
  </div>
  <span class="badge" style="top:148px;right:80px">Подзаголовок / описание</span>

  <!-- SERVICES GRID — 4 BIG CARDS -->
  <div style="position:absolute;top:184px;left:80px;right:80px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px">

    <!-- Card 1 ACTIVE -->
    <div style="height:280px;background:#252525;border:1px solid rgba(255,255,255,0.08);border-radius:8px;border-top:3px solid #666;padding:24px;display:flex;flex-direction:column;gap:12px;position:relative">
      <div class="phl" style="width:32px;height:32px;border-radius:6px"></div>
      <div class="phl" style="height:14px;width:75%"></div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
        <div class="ph" style="height:9px;width:95%"></div>
        <div class="ph" style="height:9px;width:85%"></div>
        <div class="ph" style="height:9px;width:70%"></div>
      </div>
      <div style="height:1px;background:rgba(255,255,255,0.05);margin-top:4px"></div>
      <div class="ph" style="height:9px;width:60%"></div>
      <div class="ph" style="height:9px;width:50%"></div>
      <div class="ph" style="height:9px;width:55%"></div>
      <div style="margin-top:auto">
        <div class="ph" style="width:80px;height:28px;border-radius:4px;background:#444"></div>
      </div>
      <span class="badge" style="top:8px;right:8px">Активная</span>
    </div>

    <!-- Cards 2-4 -->
    <div style="height:280px;background:#222;border:1px solid rgba(255,255,255,0.05);border-radius:8px;border-top:3px solid rgba(255,255,255,0.1);padding:24px;display:flex;flex-direction:column;gap:12px">
      <div class="ph" style="width:32px;height:32px;border-radius:6px"></div>
      <div class="ph" style="height:14px;width:80%"></div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
        <div class="ph" style="height:9px;width:90%"></div>
        <div class="ph" style="height:9px;width:78%"></div>
        <div class="ph" style="height:9px;width:65%"></div>
      </div>
      <div style="height:1px;background:rgba(255,255,255,0.04)"></div>
      <div class="ph" style="height:9px;width:55%"></div>
      <div class="ph" style="height:9px;width:48%"></div>
      <div style="margin-top:auto"><div class="ph" style="width:80px;height:28px;border-radius:4px;background:#333"></div></div>
    </div>
    <div style="height:280px;background:#222;border:1px solid rgba(255,255,255,0.05);border-radius:8px;border-top:3px solid rgba(255,255,255,0.1);padding:24px;display:flex;flex-direction:column;gap:12px">
      <div class="ph" style="width:32px;height:32px;border-radius:6px"></div>
      <div class="ph" style="height:14px;width:70%"></div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
        <div class="ph" style="height:9px;width:88%"></div>
        <div class="ph" style="height:9px;width:72%"></div>
        <div class="ph" style="height:9px;width:60%"></div>
      </div>
      <div style="height:1px;background:rgba(255,255,255,0.04)"></div>
      <div class="ph" style="height:9px;width:58%"></div>
      <div class="ph" style="height:9px;width:44%"></div>
      <div style="margin-top:auto"><div class="ph" style="width:80px;height:28px;border-radius:4px;background:#333"></div></div>
    </div>
    <div style="height:280px;background:#222;border:1px solid rgba(255,255,255,0.05);border-radius:8px;border-top:3px solid rgba(255,255,255,0.1);padding:24px;display:flex;flex-direction:column;gap:12px">
      <div class="ph" style="width:32px;height:32px;border-radius:6px"></div>
      <div class="ph" style="height:14px;width:85%"></div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
        <div class="ph" style="height:9px;width:92%"></div>
        <div class="ph" style="height:9px;width:76%"></div>
        <div class="ph" style="height:9px;width:63%"></div>
      </div>
      <div style="height:1px;background:rgba(255,255,255,0.04)"></div>
      <div class="ph" style="height:9px;width:52%"></div>
      <div class="ph" style="height:9px;width:46%"></div>
      <div style="margin-top:auto"><div class="ph" style="width:80px;height:28px;border-radius:4px;background:#333"></div></div>
    </div>
  </div>
  <span class="badge" style="top:192px;right:80px">4 Услуги — карточки</span>

  <!-- PROCESS STEPPER -->
  <div style="position:absolute;top:500px;left:80px;right:80px">
    <div class="ph" style="width:120px;height:11px;margin-bottom:24px"></div>
    <div style="display:flex;gap:0;position:relative">
      <!-- line -->
      <div style="position:absolute;top:18px;left:18px;right:18px;height:2px;background:#2E2E2E"></div>
      <div style="position:absolute;top:18px;left:18px;width:30%;height:2px;background:#444"></div>
      <!-- Steps -->
      <div style="flex:1;display:flex;flex-direction:column;gap:10px;align-items:flex-start;position:relative;z-index:1">
        <div class="phl" style="width:36px;height:36px;border-radius:50%"></div>
        <div class="phl" style="height:11px;width:70%"></div>
        <div class="ph" style="height:9px;width:90%"></div>
        <div class="ph" style="height:9px;width:75%"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:10px;align-items:flex-start;position:relative;z-index:1">
        <div class="ph" style="width:36px;height:36px;border-radius:50%"></div>
        <div class="ph" style="height:11px;width:60%"></div>
        <div class="ph" style="height:9px;width:85%"></div>
        <div class="ph" style="height:9px;width:70%"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:10px;align-items:flex-start;position:relative;z-index:1">
        <div class="ph" style="width:36px;height:36px;border-radius:50%"></div>
        <div class="ph" style="height:11px;width:65%"></div>
        <div class="ph" style="height:9px;width:80%"></div>
        <div class="ph" style="height:9px;width:68%"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:10px;align-items:flex-start;position:relative;z-index:1">
        <div class="ph" style="width:36px;height:36px;border-radius:50%"></div>
        <div class="ph" style="height:11px;width:75%"></div>
        <div class="ph" style="height:9px;width:88%"></div>
        <div class="ph" style="height:9px;width:72%"></div>
      </div>
    </div>
  </div>
  <span class="badge" style="top:508px;right:80px">Процесс — 4 шага</span>

  <!-- CTA BAR -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:80px;background:#1E1E1E;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;padding:0 80px;justify-content:space-between">
    <div style="display:flex;flex-direction:column;gap:8px">
      <div class="phl" style="width:280px;height:14px"></div>
      <div class="ph" style="width:200px;height:10px"></div>
    </div>
    <div style="display:flex;gap:12px">
      <div class="ph" style="width:160px;height:44px;border-radius:4px;background:#555"></div>
      <div class="ph" style="width:140px;height:44px;border-radius:4px;background:#333;border:2px solid #444"></div>
    </div>
  </div>
  <span class="badge" style="bottom:88px;right:80px">CTA — Получить аудит</span>

  <div class="badge" style="top:72px;left:80px">03 — Услуги / Services</div>
</div>
</body>
</html>
