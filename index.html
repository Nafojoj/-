<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>WF — Кейсы</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Martian+Mono:wght@400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1440px; height:900px; overflow:hidden; background:#1A1A1A; font-family:'Montserrat',sans-serif; }
.ph  { background:#2A2A2A; border-radius:3px; }
.phl { background:#333;   border-radius:3px; }
.lbl { font-family:'Martian Mono',monospace; font-size:9px; color:rgba(255,255,255,0.22); letter-spacing:.1em; text-transform:uppercase; white-space:nowrap; }
.badge { position:absolute; font-family:'Martian Mono',monospace; font-size:8px; color:rgba(255,255,255,0.28); background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); padding:2px 7px; border-radius:3px; letter-spacing:.07em; text-transform:uppercase; white-space:nowrap; }
.page { width:1440px; height:900px; position:relative; overflow:hidden; }
.center { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%); }
</style>
</head>
<body>
<div class="page">

  <!-- NAV -->
  <div style="position:absolute;top:0;left:0;right:0;height:64px;background:#222;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 80px;">
    <div class="ph" style="width:80px;height:14px"></div>
    <div style="display:flex;gap:32px;margin-left:auto">
      <div class="ph" style="width:56px;height:10px"></div>
      <div class="ph" style="width:56px;height:10px"></div>
      <div class="ph" style="width:56px;height:10px"></div>
      <div class="ph" style="width:56px;height:10px;opacity:.5"></div>
    </div>
    <div class="ph" style="width:120px;height:36px;border-radius:4px;background:#555;margin-left:32px"></div>
  </div>

  <!-- HEADER ROW -->
  <div style="position:absolute;top:64px;left:80px;right:80px;height:80px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06)">
    <div style="display:flex;flex-direction:column;gap:8px">
      <div class="ph" style="width:80px;height:10px"></div>
      <div class="phl" style="width:200px;height:28px;border-radius:4px"></div>
    </div>
    <!-- Filter pills -->
    <div style="display:flex;gap:8px;align-items:center">
      <div class="phl" style="width:48px;height:28px;border-radius:20px"></div>
      <div class="ph" style="width:72px;height:28px;border-radius:20px"></div>
      <div class="ph" style="width:60px;height:28px;border-radius:20px"></div>
      <div class="ph" style="width:68px;height:28px;border-radius:20px"></div>
      <div class="ph" style="width:56px;height:28px;border-radius:20px"></div>
    </div>
  </div>
  <span class="badge" style="top:108px;right:80px">Фильтры по нишам</span>

  <!-- FEATURED BIG CASE -->
  <div style="position:absolute;top:164px;left:80px;right:80px;height:220px;background:#242424;border:1px solid rgba(255,255,255,0.07);border-radius:8px;border-left:4px solid #666;padding:32px;display:flex;gap:40px;align-items:stretch">
    <!-- Left: image placeholder -->
    <div class="phl" style="width:300px;height:100%;border-radius:6px;flex-shrink:0;position:relative">
      <div class="center lbl" style="font-size:8px;text-align:center">Обложка кейса</div>
    </div>
    <!-- Middle: content -->
    <div style="flex:1;display:flex;flex-direction:column;gap:10px;justify-content:center">
      <div class="ph" style="width:100px;height:10px"></div>
      <div class="phl" style="height:20px;width:80%"></div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
        <div class="ph" style="height:10px;width:90%"></div>
        <div class="ph" style="height:10px;width:75%"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <div class="ph" style="width:64px;height:24px;border-radius:20px;background:#333"></div>
        <div class="ph" style="width:56px;height:24px;border-radius:20px;background:#333"></div>
      </div>
    </div>
    <!-- Right: metrics -->
    <div style="width:200px;display:flex;flex-direction:column;gap:8px;justify-content:center">
      <div class="ph" style="height:56px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);position:relative">
        <div class="center lbl" style="font-size:8px">−38% CPL</div>
      </div>
      <div class="ph" style="height:56px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);position:relative">
        <div class="center lbl" style="font-size:8px">×2.4 Конверсия</div>
      </div>
      <div class="ph" style="height:56px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);position:relative">
        <div class="center lbl" style="font-size:8px">ROI 280%</div>
      </div>
    </div>
  </div>
  <span class="badge" style="top:172px;left:80px;margin-left:8px">Featured кейс</span>

  <!-- CASES GRID 3-COL -->
  <div style="position:absolute;top:408px;left:80px;right:80px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
    <!-- Card template repeated -->
    <div style="height:180px;background:#222;border:1px solid rgba(255,255,255,0.05);border-radius:6px;padding:20px;display:flex;flex-direction:column;gap:10px;position:relative">
      <div class="ph" style="height:80px;border-radius:4px;position:relative">
        <div class="center lbl" style="font-size:8px">Обложка</div>
      </div>
      <div class="ph" style="width:70px;height:9px"></div>
      <div class="ph" style="height:12px;width:85%"></div>
      <div style="display:flex;gap:32px;margin-top:auto">
        <div style="display:flex;flex-direction:column;gap:4px">
          <div class="phl" style="width:48px;height:14px;border-radius:2px"></div>
          <div class="ph" style="width:56px;height:8px"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <div class="phl" style="width:48px;height:14px;border-radius:2px"></div>
          <div class="ph" style="width:64px;height:8px"></div>
        </div>
      </div>
    </div>
    <div style="height:180px;background:#222;border:1px solid rgba(255,255,255,0.05);border-radius:6px;padding:20px;display:flex;flex-direction:column;gap:10px">
      <div class="ph" style="height:80px;border-radius:4px"></div>
      <div class="ph" style="width:64px;height:9px"></div>
      <div class="ph" style="height:12px;width:78%"></div>
      <div style="display:flex;gap:32px;margin-top:auto">
        <div style="display:flex;flex-direction:column;gap:4px"><div class="phl" style="width:48px;height:14px;border-radius:2px"></div><div class="ph" style="width:52px;height:8px"></div></div>
        <div style="display:flex;flex-direction:column;gap:4px"><div class="phl" style="width:48px;height:14px;border-radius:2px"></div><div class="ph" style="width:60px;height:8px"></div></div>
      </div>
    </div>
    <div style="height:180px;background:#222;border:1px solid rgba(255,255,255,0.05);border-radius:6px;padding:20px;display:flex;flex-direction:column;gap:10px">
      <div class="ph" style="height:80px;border-radius:4px"></div>
      <div class="ph" style="width:72px;height:9px"></div>
      <div class="ph" style="height:12px;width:90%"></div>
      <div style="display:flex;gap:32px;margin-top:auto">
        <div style="display:flex;flex-direction:column;gap:4px"><div class="phl" style="width:48px;height:14px;border-radius:2px"></div><div class="ph" style="width:56px;height:8px"></div></div>
        <div style="display:flex;flex-direction:column;gap:4px"><div class="phl" style="width:48px;height:14px;border-radius:2px"></div><div class="ph" style="width:64px;height:8px"></div></div>
      </div>
    </div>
  </div>
  <span class="badge" style="top:416px;right:80px">Сетка кейсов 3 кол.</span>

  <!-- CTA BAR -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:80px;background:#1E1E1E;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;padding:0 80px;justify-content:space-between">
    <div style="display:flex;flex-direction:column;gap:8px">
      <div class="phl" style="width:260px;height:14px"></div>
      <div class="ph" style="width:180px;height:10px"></div>
    </div>
    <div class="ph" style="width:160px;height:44px;border-radius:4px;background:#555"></div>
  </div>

  <div class="badge" style="top:72px;left:80px">04 — Кейсы / Cases</div>
</div>
</body>
</html>
